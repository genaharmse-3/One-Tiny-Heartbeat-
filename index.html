<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Tiny Heartbeat</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- SKY -->
<div id="sky"></div>

<!-- SUN -->
<div id="sun"></div>

<!-- MOVING CLOUDS -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>
<div class="cloud cloud4"></div>
<div class="cloud cloud5"></div>

<!-- FLOATING PARTICLES -->
<div id="particles"></div>

<!-- MAIN CONTENT -->
<div id="hero">

    <h1 id="main-title"></h1>

    <p id="subtitle"></p>

    <button id="begin-button">

        Begin Our Story

    </button>

</div>

<!-- HEARTBEAT -->
<svg id="heartbeat" viewBox="0 0 1200 120">

<path
id="heartbeat-path"
d="
M0 60
L180 60
L210 60
L235 20
L260 95
L285 35
L310 60
L1200 60"
/>

</svg>

<!-- MUSIC -->
<audio id="music" loop>

<source src="assets/music.mp3" type="audio/mpeg">

</audio>

<!-- SOUNDS -->
<audio id="heartbeat-sound">

<source src="assets/heartbeat.mp3" type="audio/mpeg">

</audio>

<audio id="whoosh">

<source src="assets/whoosh.mp3" type="audio/mpeg">

</audio>

<script src="js/app.js"></script>

</body>

</html>
