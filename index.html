<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Tiny Heartbeat</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">

<!-- Main CSS -->
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- SKY -->
<div id="sky"></div>

<!-- SUN -->
<div id="sun"></div>

<!-- CLOUD LAYER -->
<div id="cloud-layer">

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>
<div class="cloud c4"></div>
<div class="cloud c5"></div>

</div>

<!-- SPARKLES -->
<div id="sparkles"></div>

<!-- MAIN CONTENT -->

<div id="hero">

<h1 id="main-title"></h1>

<p id="subtitle"></p>

<button id="begin-button">

Begin Our Story

</button>

</div>

<!-- HEARTBEAT SVG -->

<svg id="heartbeat-svg" viewBox="0 0 1200 140">

<path
id="heartbeat-path"
d="
M0 70
L250 70
L285 70
L305 30
L330 105
L355 40
L385 70
L1200 70"
/>

</svg>

<!-- MUSIC -->

<audio id="music" loop>

<source src="assets/music.mp3" type="audio/mpeg">

</audio>

<audio id="heartbeat-sound">

<source src="assets/heartbeat.mp3" type="audio/mpeg">

</audio>

<audio id="whoosh">

<source src="assets/whoosh.mp3" type="audio/mpeg">

</audio>

<!-- Javascript -->

<script src="js/app.js"></script>

</body>

</html>
