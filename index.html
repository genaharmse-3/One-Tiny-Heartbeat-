<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Tiny Heartbeat</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- SKY -->
<div id="sky"></div>

<!-- SUN -->
<div id="sun"></div>

<!-- CLOUD LAYERS -->

<div id="clouds-back">

<div class="cloud cloud-a"></div>
<div class="cloud cloud-b"></div>

</div>

<div id="clouds-middle">

<div class="cloud cloud-c"></div>
<div class="cloud cloud-d"></div>

</div>

<div id="clouds-front">

<div class="cloud cloud-e"></div>
<div class="cloud cloud-f"></div>

</div>

<!-- HERO -->

<section id="hero">

<h1 id="main-title"></h1>

<p id="subtitle"></p>

<button id="begin-button">

Begin Our Story

</button>

</section>

<!-- HEARTBEAT -->

<svg id="heartbeat" viewBox="0 0 1200 120">

<path id="heartbeat-path"
d="M0 60
L220 60
L250 60
L275 20
L300 95
L325 35
L350 60
L1200 60"/>

</svg>

<!-- AUDIO -->

<audio id="music" loop>

<source src="assets/music.mp3" type="audio/mpeg">

</audio>

<audio id="heartbeat-sound">

<source src="assets/heartbeat.mp3" type="audio/mpeg">

</audio>

<audio id="whoosh">

<source src="assets/whoosh.mp3" type="audio/mpeg">

</audio>

<script src="js/app.js"></script>

</body>

</html>
