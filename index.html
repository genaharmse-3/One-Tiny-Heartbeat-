<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>One Tiny Heartbeat</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Patrick+Hand&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<!-- SKY -->

<div id="sky">

    <div id="sun"></div>

    <!-- Back Clouds -->

    <div id="cloud-layer-back">

        <div class="cloud c1"></div>
        <div class="cloud c2"></div>

    </div>

    <!-- Middle Clouds -->

    <div id="cloud-layer-middle">

        <div class="cloud c3"></div>
        <div class="cloud c4"></div>

    </div>

    <!-- Front Clouds -->

    <div id="cloud-layer-front">

        <div class="cloud c5"></div>
        <div class="cloud c6"></div>

    </div>

</div>

<!-- HERO -->

<section id="hero">

    <h1 id="title"></h1>

    <p id="subtitle"></p>

    <button id="begin">

        Begin Our Story

    </button>

</section>

<!-- HEARTBEAT -->

<svg id="heartbeat"
viewBox="0 0 1200 120"
preserveAspectRatio="none">

<path
id="heartbeat-path"
d="
M0 60
L170 60
L205 60
L230 18
L255 92
L282 34
L310 60
L1200 60
"/>

</svg>

<!-- AUDIO -->

<audio id="music" loop>

<source
src="assets/music.mp3"
type="audio/mpeg">

</audio>

<audio id="beat">

<source
src="assets/heartbeat.mp3"
type="audio/mpeg">

</audio>

<audio id="whoosh">

<source
src="assets/whoosh.mp3"
type="audio/mpeg">

</audio>

<script src="js/app.js"></script>

</body>

</html>
